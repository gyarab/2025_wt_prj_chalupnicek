# (záměrně – jedná se o ukázková data pro lokální vývoj).
# Hash je stejný jako u původního admin uživatele; pbkdf2 hash je sám o sobě
# unikátní díky soli, takže jeho sdílení mezi účty znamená pouze, že všechny
# heslo "admin" akceptují.

