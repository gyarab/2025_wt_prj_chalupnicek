# Nasazení FilmDB na gawt.dtcloud.cz přes Ansible.
#
# Spouští se:
#   - automaticky při pushi do `main` (jen deploy, data zůstávají)
#   - ručně (Actions -> Deploy -> Run workflow), kde lze zaškrtnout "seed" a tím
#     znovu naplnit databázi z fixtures (POZOR: napřed ji vyprázdní).
#
# Jediné tajemství je SSH klíč v repository secrets jako SSH_PRIVATE_KEY
# (Settings -> Secrets and variables -> Actions). Veřejný klíč musí být v
# ~/.ssh/authorized_keys uživatele `ansible_user` z deploy/inventory.ini.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      seed:
        description: "Znovu naplnit databázi z fixtures (FLUSH + loaddata)"
        type: boolean
        default: false

# Ať se dvě nasazení neperou o server.
concurrency:
  group: deploy-gawt
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy
    env:
      ANSIBLE_PRIVATE_KEY_FILE: ${{ github.workspace }}/.ssh-deploy-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible + docker collection
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core>=2.16,<2.19"
          ansible-galaxy collection install community.docker

      - name: Write SSH private key from secret
        run: |
          install -m 600 /dev/null "$ANSIBLE_PRIVATE_KEY_FILE"
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > "$ANSIBLE_PRIVATE_KEY_FILE"

      - name: Deploy stack
        run: ansible-playbook playbooks/deploy.yml

      - name: Seed database (manual, optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.seed }}
        run: ansible-playbook playbooks/seed.yml
